<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hondana - 本棚管理</title>
<style>
  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --accent: #E8740C;
    --accent-light: #FFF0E0;
    --accent-dark: #C45A00;
    --text: #3A2E28;
    --text-sub: #8A7A70;
    --border: #F0E0D0;
    --danger: #E04040;
    --danger-light: #FFF0F0;
    --success: #2DA060;
    --success-light: #E8F8F0;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: 80px;
  }

  header {
    background: linear-gradient(135deg, #E8740C, #F09030);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(232,116,12,0.3);
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  header p {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
  }

  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 62px;
    z-index: 99;
  }

  .tab {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-sub);
    border: none;
    background: none;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }

  .tab.active {
    color: var(--accent);
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    width: 60%;
    height: 3px;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
  }

  .tab .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    line-height: 18px;
    border-radius: 9px;
    padding: 0 5px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .content {
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  .section { display: none; }
  .section.active { display: block; }

  .alert-banner {
    background: var(--danger-light);
    border: 1px solid #F0C0C0;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--danger);
    font-weight: 600;
  }

  .alert-banner .icon { font-size: 20px; }

  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.15s;
  }

  .card:active {
    transform: scale(0.98);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .book-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
  }

  .book-author {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .due-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    margin-left: 10px;
    flex-shrink: 0;
  }

  .due-tag.overdue {
    background: var(--danger);
    color: white;
  }

  .due-tag.soon {
    background: #F0A020;
    color: white;
  }

  .due-tag.safe {
    background: var(--success-light);
    color: var(--success);
  }

  .due-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-sub);
  }

  .due-date { font-weight: 600; }

  .card-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }

  .btn-sm:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn-sm.danger:hover {
    background: var(--danger-light);
    color: var(--danger);
    border-color: var(--danger);
  }

  .reading-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .status-label {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .status-label.unread {
    background: var(--accent-light);
    color: var(--accent);
  }

  .status-label.reading {
    background: #E0F0FF;
    color: #2080D0;
  }

  .status-label.done {
    background: var(--success-light);
    color: var(--success);
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-sub);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: linear-gradient(135deg, #E8740C, #F09030);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,116,12,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
    z-index: 90;
  }

  .fab:active { transform: scale(0.9); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 480px;
    max-height: 85dvh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 20px;
    text-align: center;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--accent);
  }

  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .type-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    color: var(--text-sub);
    transition: all 0.2s;
  }

  .type-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #E8740C, #F09030);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
    font-family: inherit;
  }

  .btn-primary:active { opacity: 0.8; }

  .btn-secondary {
    width: 100%;
    padding: 12px;
    background: none;
    color: var(--text-sub);
    border: none;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    font-family: inherit;
  }

  .summary-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .summary-item {
    flex: 1;
    background: var(--card);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .summary-item .num {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
  }

  .summary-item .label {
    font-size: 10px;
    color: var(--text-sub);
    margin-top: 2px;
    font-weight: 600;
  }

  .summary-item.warn .num { color: var(--danger); }
</style>
</head>
<body>

<header>
  <h1>Hondana</h1>
  <p>あなたの本棚をスマートに管理</p>
</header>

<div class="tabs">
  <button class="tab active" data-tab="library" id="tab-library">
    図書館の本 <span class="badge" id="library-count">0</span>
  </button>
  <button class="tab" data-tab="mybooks" id="tab-mybooks">
    読書リスト <span class="badge" id="mybooks-count">0</span>
  </button>
</div>

<div class="content">
  <!-- 図書館セクション -->
  <div class="section active" id="section-library">
    <div class="summary-bar" id="library-summary"></div>
    <div id="library-alert"></div>
    <div id="library-list"></div>
    <div class="empty-state" id="library-empty">
      <div class="icon">📚</div>
      <p>図書館の本はまだありません<br>＋ボタンから追加しましょう</p>
    </div>
  </div>

  <!-- 読書リストセクション -->
  <div class="section" id="section-mybooks">
    <div class="summary-bar" id="mybooks-summary"></div>
    <div id="mybooks-list"></div>
    <div class="empty-state" id="mybooks-empty">
      <div class="icon">📖</div>
      <p>読書リストはまだ空です<br>読みたい本を追加しましょう</p>
    </div>
  </div>
</div>

<button class="fab" id="fab-add" aria-label="本を追加">＋</button>

<!-- 追加モーダル -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">本を追加</h2>

    <div class="type-toggle">
      <button class="type-btn active" data-type="library">📚 図書館の本</button>
      <button class="type-btn" data-type="mybook">📖 読書リスト</button>
    </div>

    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="input-title" placeholder="本のタイトル">
    </div>
    <div class="form-group">
      <label>著者（任意）</label>
      <input type="text" id="input-author" placeholder="著者名">
    </div>
    <div class="form-group" id="group-due">
      <label>返却期限</label>
      <input type="date" id="input-due">
    </div>
    <div class="form-group" id="group-status" style="display:none">
      <label>ステータス</label>
      <select id="input-status">
        <option value="unread">未読</option>
        <option value="reading">読書中</option>
        <option value="done">読了</option>
      </select>
    </div>

    <button class="btn-primary" id="btn-save">追加する</button>
    <button class="btn-secondary" id="btn-cancel">キャンセル</button>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>本を編集</h2>

    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-type">
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="edit-title">
    </div>
    <div class="form-group">
      <label>著者（任意）</label>
      <input type="text" id="edit-author">
    </div>
    <div class="form-group" id="edit-group-due">
      <label>返却期限</label>
      <input type="date" id="edit-due">
    </div>
    <div class="form-group" id="edit-group-status" style="display:none">
      <label>ステータス</label>
      <select id="edit-status">
        <option value="unread">未読</option>
        <option value="reading">読書中</option>
        <option value="done">読了</option>
      </select>
    </div>

    <button class="btn-primary" id="btn-update">更新する</button>
    <button class="btn-secondary" id="btn-edit-cancel">キャンセル</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'hondana_books';

function loadBooks() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    return [];
  }
}

function saveBooks(books) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function daysUntil(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(dateStr);
  due.setHours(0, 0, 0, 0);
  return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}（${['日','月','火','水','木','金','土'][d.getDay()]}）`;
}

function getDueTag(days) {
  if (days < 0) return `<span class="due-tag overdue">${Math.abs(days)}日超過</span>`;
  if (days === 0) return '<span class="due-tag overdue">今日まで</span>';
  if (days <= 3) return `<span class="due-tag soon">あと${days}日</span>`;
  return `<span class="due-tag safe">あと${days}日</span>`;
}

function getStatusLabel(status) {
  const map = {
    unread: '<span class="status-label unread">未読</span>',
    reading: '<span class="status-label reading">読書中</span>',
    done: '<span class="status-label done">読了</span>'
  };
  return map[status] || map.unread;
}

// --- Tabs ---
let currentTab = 'library';
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(`section-${currentTab}`).classList.add('active');
  });
});

// --- Add Modal ---
let addType = 'library';
const modalAdd = document.getElementById('modal-add');
const modalEdit = document.getElementById('modal-edit');

document.getElementById('fab-add').addEventListener('click', () => {
  addType = currentTab === 'mybooks' ? 'mybook' : 'library';
  updateTypeToggle();
  document.getElementById('input-title').value = '';
  document.getElementById('input-author').value = '';
  document.getElementById('input-due').value = '';
  document.getElementById('input-status').value = 'unread';
  modalAdd.classList.add('show');
});

document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    addType = btn.dataset.type;
    updateTypeToggle();
  });
});

function updateTypeToggle() {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === addType));
  document.getElementById('group-due').style.display = addType === 'library' ? '' : 'none';
  document.getElementById('group-status').style.display = addType === 'mybook' ? '' : 'none';
}

document.getElementById('btn-cancel').addEventListener('click', () => modalAdd.classList.remove('show'));
modalAdd.addEventListener('click', e => { if (e.target === modalAdd) modalAdd.classList.remove('show'); });

document.getElementById('btn-save').addEventListener('click', () => {
  const title = document.getElementById('input-title').value.trim();
  if (!title) { document.getElementById('input-title').focus(); return; }

  const book = {
    id: genId(),
    title,
    author: document.getElementById('input-author').value.trim(),
    type: addType,
    createdAt: new Date().toISOString()
  };

  if (addType === 'library') {
    book.dueDate = document.getElementById('input-due').value;
    if (!book.dueDate) { document.getElementById('input-due').focus(); return; }
  } else {
    book.status = document.getElementById('input-status').value;
  }

  const books = loadBooks();
  books.push(book);
  saveBooks(books);
  modalAdd.classList.remove('show');

  if (addType === 'mybook' && currentTab !== 'mybooks') {
    document.querySelector('[data-tab="mybooks"]').click();
  }
  render();
});

// --- Edit Modal ---
document.getElementById('btn-edit-cancel').addEventListener('click', () => modalEdit.classList.remove('show'));
modalEdit.addEventListener('click', e => { if (e.target === modalEdit) modalEdit.classList.remove('show'); });

function openEdit(id) {
  const books = loadBooks();
  const book = books.find(b => b.id === id);
  if (!book) return;

  document.getElementById('edit-id').value = book.id;
  document.getElementById('edit-type').value = book.type;
  document.getElementById('edit-title').value = book.title;
  document.getElementById('edit-author').value = book.author || '';

  if (book.type === 'library') {
    document.getElementById('edit-group-due').style.display = '';
    document.getElementById('edit-group-status').style.display = 'none';
    document.getElementById('edit-due').value = book.dueDate || '';
  } else {
    document.getElementById('edit-group-due').style.display = 'none';
    document.getElementById('edit-group-status').style.display = '';
    document.getElementById('edit-status').value = book.status || 'unread';
  }

  modalEdit.classList.add('show');
}

document.getElementById('btn-update').addEventListener('click', () => {
  const id = document.getElementById('edit-id').value;
  const type = document.getElementById('edit-type').value;
  const title = document.getElementById('edit-title').value.trim();
  if (!title) return;

  const books = loadBooks();
  const idx = books.findIndex(b => b.id === id);
  if (idx === -1) return;

  books[idx].title = title;
  books[idx].author = document.getElementById('edit-author').value.trim();

  if (type === 'library') {
    const due = document.getElementById('edit-due').value;
    if (!due) return;
    books[idx].dueDate = due;
  } else {
    books[idx].status = document.getElementById('edit-status').value;
  }

  saveBooks(books);
  modalEdit.classList.remove('show');
  render();
});

// --- Delete ---
function deleteBook(id) {
  if (!confirm('この本を削除しますか？')) return;
  const books = loadBooks().filter(b => b.id !== id);
  saveBooks(books);
  render();
}

// --- Return (library book returned) ---
function returnBook(id) {
  if (!confirm('返却済みにしますか？')) return;
  const books = loadBooks().filter(b => b.id !== id);
  saveBooks(books);
  render();
}

// --- Render ---
function render() {
  const books = loadBooks();
  const libBooks = books.filter(b => b.type === 'library').sort((a, b) => {
    return new Date(a.dueDate) - new Date(b.dueDate);
  });
  const myBooks = books.filter(b => b.type === 'mybook').sort((a, b) => {
    const order = { reading: 0, unread: 1, done: 2 };
    return (order[a.status] ?? 1) - (order[b.status] ?? 1);
  });

  // Counts
  document.getElementById('library-count').textContent = libBooks.length;
  document.getElementById('mybooks-count').textContent = myBooks.length;

  // Library summary
  const overdue = libBooks.filter(b => daysUntil(b.dueDate) < 0).length;
  const soon = libBooks.filter(b => { const d = daysUntil(b.dueDate); return d >= 0 && d <= 3; }).length;
  const summaryEl = document.getElementById('library-summary');

  if (libBooks.length > 0) {
    summaryEl.innerHTML = `
      <div class="summary-item ${overdue > 0 ? 'warn' : ''}">
        <div class="num">${overdue}</div>
        <div class="label">期限超過</div>
      </div>
      <div class="summary-item ${soon > 0 ? 'warn' : ''}">
        <div class="num">${soon}</div>
        <div class="label">もうすぐ</div>
      </div>
      <div class="summary-item">
        <div class="num">${libBooks.length}</div>
        <div class="label">借りている本</div>
      </div>
    `;
  } else {
    summaryEl.innerHTML = '';
  }

  // Library alert
  const alertEl = document.getElementById('library-alert');
  if (overdue > 0) {
    alertEl.innerHTML = `<div class="alert-banner"><span class="icon">⚠️</span> ${overdue}冊の本が返却期限を過ぎています！</div>`;
  } else {
    alertEl.innerHTML = '';
  }

  // Library list
  const libListEl = document.getElementById('library-list');
  document.getElementById('library-empty').style.display = libBooks.length ? 'none' : '';

  libListEl.innerHTML = libBooks.map(book => {
    const days = daysUntil(book.dueDate);
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="book-title">${escHtml(book.title)}</div>
            ${book.author ? `<div class="book-author">${escHtml(book.author)}</div>` : ''}
          </div>
          ${getDueTag(days)}
        </div>
        <div class="due-info">
          <span class="due-date">返却日: ${formatDate(book.dueDate)}</span>
          <div class="card-actions">
            <button class="btn-sm" onclick="openEdit('${book.id}')">編集</button>
            <button class="btn-sm" onclick="returnBook('${book.id}')">返却</button>
            <button class="btn-sm danger" onclick="deleteBook('${book.id}')">削除</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // My books summary
  const mySummary = document.getElementById('mybooks-summary');
  if (myBooks.length > 0) {
    const unread = myBooks.filter(b => b.status === 'unread').length;
    const reading = myBooks.filter(b => b.status === 'reading').length;
    const done = myBooks.filter(b => b.status === 'done').length;
    mySummary.innerHTML = `
      <div class="summary-item">
        <div class="num">${unread}</div>
        <div class="label">未読</div>
      </div>
      <div class="summary-item">
        <div class="num">${reading}</div>
        <div class="label">読書中</div>
      </div>
      <div class="summary-item">
        <div class="num">${done}</div>
        <div class="label">読了</div>
      </div>
    `;
  } else {
    mySummary.innerHTML = '';
  }

  // My books list
  const myListEl = document.getElementById('mybooks-list');
  document.getElementById('mybooks-empty').style.display = myBooks.length ? 'none' : '';

  myListEl.innerHTML = myBooks.map(book => {
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="book-title">${escHtml(book.title)}</div>
            ${book.author ? `<div class="book-author">${escHtml(book.author)}</div>` : ''}
          </div>
        </div>
        <div class="reading-status">
          ${getStatusLabel(book.status)}
          <div style="flex:1"></div>
          <div class="card-actions">
            <button class="btn-sm" onclick="openEdit('${book.id}')">編集</button>
            <button class="btn-sm danger" onclick="deleteBook('${book.id}')">削除</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Init
render();
</script>
</body>
</html>
