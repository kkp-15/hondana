<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hondana - 本棚管理</title>
<style>
  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --accent: #E8740C;
    --accent-light: #FFF0E0;
    --text: #3A2E28;
    --text-sub: #8A7A70;
    --border: #F0E0D0;
    --danger: #E04040;
    --danger-light: #FFF0F0;
    --success: #2DA060;
    --success-light: #E8F8F0;
    --blue: #2080D0;
    --blue-light: #E0F0FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: 72px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #E8740C, #F09030);
    color: white;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(232,116,12,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }

  .header-stats {
    font-size: 11px;
    opacity: 0.9;
    text-align: right;
    line-height: 1.5;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    display: flex;
    border-top: 1px solid var(--border);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-item {
    flex: 1;
    padding: 8px 0 10px;
    text-align: center;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-sub);
    transition: color 0.2s;
    position: relative;
  }

  .nav-item .icon { font-size: 22px; display: block; }
  .nav-item .label { font-size: 10px; font-weight: 600; margin-top: 2px; display: block; }

  .nav-item.active { color: var(--accent); }
  .nav-item.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 25%;
    width: 50%;
    height: 2px;
    background: var(--accent);
    border-radius: 0 0 2px 2px;
  }

  .nav-badge {
    position: absolute;
    top: 4px;
    right: calc(50% - 20px);
    background: var(--danger);
    color: white;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    line-height: 16px;
    border-radius: 8px;
    padding: 0 4px;
  }

  /* ── Content ── */
  .content {
    padding: 14px 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* ── Alert ── */
  .alert {
    background: var(--danger-light);
    border: 1px solid #F0C0C0;
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--danger);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    border: 1px solid var(--border);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .book-title { font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1; }
  .book-author { font-size: 12px; color: var(--text-sub); margin-top: 1px; }

  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag-overdue { background: var(--danger); color: white; }
  .tag-soon { background: #F0A020; color: white; }
  .tag-safe { background: var(--success-light); color: var(--success); }
  .tag-unread { background: var(--accent-light); color: var(--accent); }
  .tag-reading { background: var(--blue-light); color: var(--blue); }
  .tag-done { background: var(--success-light); color: var(--success); }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-sub);
  }

  .card-actions { display: flex; gap: 6px; }

  .btn-s {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    cursor: pointer;
    font-weight: 600;
  }

  .btn-s:active { opacity: 0.7; }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #F0A030);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── Memo ── */
  .memo {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.5;
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 8px;
  }

  /* ── Dispose info ── */
  .dispose-method {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    background: #F0E8E0;
    color: var(--text-sub);
  }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-sub);
  }

  .empty .icon { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 13px; line-height: 1.6; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 26px;
    background: linear-gradient(135deg, #E8740C, #F09030);
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,116,12,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
  }

  .fab:active { transform: scale(0.9); }

  /* ── Modal ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-bg.show { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 480px;
    max-height: 85dvh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 14px;
  }

  .modal h2 { font-size: 17px; text-align: center; margin-bottom: 16px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 4px;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }

  .field textarea { resize: vertical; min-height: 60px; font-size: 14px; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }

  .type-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .type-tab {
    flex: 1;
    padding: 10px 4px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    color: var(--text-sub);
  }

  .type-tab.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  .btn-main {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #E8740C, #F09030);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
  }

  .btn-main:active { opacity: 0.8; }

  .btn-sub {
    width: 100%;
    padding: 10px;
    background: none;
    color: var(--text-sub);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
  }

  .conditional { display: none; }
  .conditional.show { display: block; }

  .field label .req {
    color: var(--danger);
    font-size: 10px;
    margin-left: 2px;
  }

  .optional-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 14px;
    font-size: 11px;
    color: var(--text-sub);
  }

  .optional-divider::before,
  .optional-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .optional-section .field label { color: #B0A098; }
  .optional-section .field input,
  .optional-section .field select,
  .optional-section .field textarea {
    border-color: #F0E8E0;
  }

  /* ── Rating ── */
  .stars { display: flex; gap: 4px; }
  .star {
    font-size: 24px;
    cursor: pointer;
    color: var(--border);
    background: none;
    border: none;
    padding: 0;
  }
  .star.on { color: #F0A020; }
</style>
</head>
<body>

<header>
  <h1>Hondana</h1>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="content">
  <!-- 📚 借りてる -->
  <div class="section active" id="sec-borrow">
    <div id="borrow-alert"></div>
    <div id="borrow-list"></div>
    <div class="empty" id="borrow-empty">
      <div class="icon">📚</div>
      <p>借りている本はありません</p>
    </div>
  </div>

  <!-- 📖 持ってる -->
  <div class="section" id="sec-own">
    <div id="own-list"></div>
    <div class="empty" id="own-empty">
      <div class="icon">📖</div>
      <p>本を追加してみましょう</p>
    </div>
  </div>

  <!-- 📦 手放した -->
  <div class="section" id="sec-dispose">
    <div id="dispose-list"></div>
    <div class="empty" id="dispose-empty">
      <div class="icon">📦</div>
      <p>手放した本の記録はありません</p>
    </div>
  </div>
</div>

<button class="fab" id="fab">＋</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="borrow">
    <span class="icon">📚</span>
    <span class="label">借りてる</span>
    <span class="nav-badge" id="badge-borrow" style="display:none"></span>
  </button>
  <button class="nav-item" data-tab="own">
    <span class="icon">📖</span>
    <span class="label">持ってる</span>
  </button>
  <button class="nav-item" data-tab="dispose">
    <span class="icon">📦</span>
    <span class="label">手放した</span>
  </button>
</nav>

<!-- 追加モーダル -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>本を追加</h2>
    <div class="type-tabs">
      <button class="type-tab active" data-type="borrow">📚 借りてる</button>
      <button class="type-tab" data-type="own">📖 持ってる</button>
    </div>
    <!-- 必須 -->
    <div class="field">
      <label>タイトル <span class="req">*</span></label>
      <input type="text" id="add-title" placeholder="本のタイトル">
    </div>
    <div class="conditional" id="add-borrow-req">
      <div class="field">
        <label>返却期限 <span class="req">*</span></label>
        <input type="date" id="add-due">
      </div>
    </div>

    <div class="optional-divider">スキップOK</div>

    <!-- 任意 -->
    <div class="optional-section">
      <div class="field">
        <label>著者</label>
        <input type="text" id="add-author" placeholder="著者名">
      </div>
      <div class="field">
        <label>読書ステータス</label>
        <select id="add-common-status">
          <option value="unread">未読</option>
          <option value="reading">読書中</option>
          <option value="done">読了</option>
        </select>
      </div>
      <div class="field">
        <label>ページ数</label>
        <input type="number" id="add-pages" placeholder="例: 320" min="0">
      </div>
      <div class="field">
        <label>メモ</label>
        <textarea id="add-memo" placeholder="感想やメモ"></textarea>
      </div>
    </div>
    <button class="btn-main" id="btn-add">追加する</button>
    <button class="btn-sub" id="btn-add-cancel">キャンセル</button>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="modal-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="edit-modal-title">編集</h2>
    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-type">

    <!-- 必須 -->
    <div class="field">
      <label>タイトル <span class="req">*</span></label>
      <input type="text" id="edit-title">
    </div>
    <div class="conditional" id="edit-borrow-req">
      <div class="field">
        <label>返却期限 <span class="req">*</span></label>
        <input type="date" id="edit-due">
      </div>
    </div>

    <div class="optional-divider">スキップOK</div>

    <!-- 任意 -->
    <div class="optional-section">
      <div class="field">
        <label>著者</label>
        <input type="text" id="edit-author">
      </div>
      <div class="field">
        <label>読書ステータス</label>
        <select id="edit-status">
          <option value="unread">未読</option>
          <option value="reading">読書中</option>
          <option value="done">読了</option>
        </select>
      </div>
      <div class="field">
        <label>読んだページ / 総ページ</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="edit-current-page" placeholder="今" min="0" style="flex:1">
          <span style="color:var(--text-sub)">/</span>
          <input type="number" id="edit-pages" placeholder="全体" min="0" style="flex:1">
        </div>
      </div>
      <div class="field">
        <label>メモ</label>
        <textarea id="edit-memo" placeholder="感想やメモ"></textarea>
      </div>
      <div class="field">
        <label>評価</label>
        <div class="stars" id="edit-stars">
          <button class="star" data-v="1">★</button>
          <button class="star" data-v="2">★</button>
          <button class="star" data-v="3">★</button>
          <button class="star" data-v="4">★</button>
          <button class="star" data-v="5">★</button>
        </div>
      </div>
    </div>
    <button class="btn-main" id="btn-update">更新する</button>
    <button class="btn-sub" id="btn-edit-cancel">キャンセル</button>
  </div>
</div>

<!-- 手放すモーダル -->
<div class="modal-bg" id="modal-dispose">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>この本を手放す</h2>
    <input type="hidden" id="dispose-id">
    <p id="dispose-book-name" style="text-align:center;font-weight:600;margin-bottom:16px"></p>
    <div class="field">
      <label>どうした？</label>
      <select id="dispose-method">
        <option value="sold">売った</option>
        <option value="gave">あげた</option>
        <option value="trashed">捨てた</option>
        <option value="returned">返した</option>
      </select>
    </div>
    <button class="btn-main" id="btn-dispose">手放す</button>
    <button class="btn-sub" id="btn-dispose-cancel">キャンセル</button>
  </div>
</div>

<script>
const KEY = 'hondana_v2';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
const save = (b) => localStorage.setItem(KEY, JSON.stringify(b));
const esc = (s) => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function daysUntil(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  const u = new Date(d); u.setHours(0,0,0,0);
  return Math.ceil((u - t) / 864e5);
}

function fmtDate(d) {
  const x = new Date(d);
  return `${x.getMonth()+1}/${x.getDate()}（${'日月火水木金土'[x.getDay()]}）`;
}

const disposeLabels = { sold: '売った', gave: 'あげた', trashed: '捨てた', returned: '返した' };
const statusLabels = { unread: '未読', reading: '読書中', done: '読了' };
const statusClass = { unread: 'tag-unread', reading: 'tag-reading', done: 'tag-done' };

// ── Tab switching ──
let curTab = 'borrow';

document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => {
    curTab = n.dataset.tab;
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    n.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + curTab).classList.add('active');
  });
});

// ── Add modal ──
let addType = 'borrow';
const mAdd = document.getElementById('modal-add');

document.getElementById('fab').onclick = () => {
  addType = curTab === 'own' ? 'own' : 'borrow';
  updAddType();
  document.getElementById('add-title').value = '';
  document.getElementById('add-author').value = '';
  document.getElementById('add-due').value = '';
  document.getElementById('add-common-status').value = 'unread';
  document.getElementById('add-pages').value = '';
  document.getElementById('add-memo').value = '';
  mAdd.classList.add('show');
};

document.querySelectorAll('.type-tab').forEach(t => {
  t.addEventListener('click', () => { addType = t.dataset.type; updAddType(); });
});

function updAddType() {
  document.querySelectorAll('.type-tab').forEach(t => t.classList.toggle('active', t.dataset.type === addType));
  document.getElementById('add-borrow-req').classList.toggle('show', addType === 'borrow');
}

document.getElementById('btn-add-cancel').onclick = () => mAdd.classList.remove('show');
mAdd.onclick = e => { if (e.target === mAdd) mAdd.classList.remove('show'); };

document.getElementById('btn-add').onclick = () => {
  const title = document.getElementById('add-title').value.trim();
  if (!title) return document.getElementById('add-title').focus();

  const book = { id: genId(), title, author: document.getElementById('add-author').value.trim(), type: addType, createdAt: new Date().toISOString() };

  book.status = document.getElementById('add-common-status').value;
  book.totalPages = parseInt(document.getElementById('add-pages').value) || 0;
  book.currentPage = 0;
  book.memo = document.getElementById('add-memo').value.trim();
  book.rating = 0;

  if (addType === 'borrow') {
    book.dueDate = document.getElementById('add-due').value;
    if (!book.dueDate) return document.getElementById('add-due').focus();
  }

  const books = load(); books.push(book); save(books);
  mAdd.classList.remove('show');
  if (addType !== curTab) document.querySelector(`[data-tab="${addType}"]`).click();
  render();
};

// ── Edit modal ──
const mEdit = document.getElementById('modal-edit');
let editRating = 0;

document.getElementById('btn-edit-cancel').onclick = () => mEdit.classList.remove('show');
mEdit.onclick = e => { if (e.target === mEdit) mEdit.classList.remove('show'); };

document.querySelectorAll('#edit-stars .star').forEach(s => {
  s.addEventListener('click', () => {
    editRating = parseInt(s.dataset.v);
    updStars();
  });
});

function updStars() {
  document.querySelectorAll('#edit-stars .star').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.v) <= editRating);
  });
}

function openEdit(id) {
  const book = load().find(b => b.id === id);
  if (!book) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-type').value = book.type;
  document.getElementById('edit-title').value = book.title;
  document.getElementById('edit-author').value = book.author || '';

  const isBorrow = book.type === 'borrow';
  document.getElementById('edit-borrow-req').classList.toggle('show', isBorrow);
  document.getElementById('edit-modal-title').textContent = isBorrow ? '借りてる本を編集' : '持ってる本を編集';

  if (isBorrow) {
    document.getElementById('edit-due').value = book.dueDate || '';
  }

  document.getElementById('edit-status').value = book.status || 'unread';
  document.getElementById('edit-current-page').value = book.currentPage || '';
  document.getElementById('edit-pages').value = book.totalPages || '';
  document.getElementById('edit-memo').value = book.memo || '';
  editRating = book.rating || 0;
  updStars();

  mEdit.classList.add('show');
}

document.getElementById('btn-update').onclick = () => {
  const id = document.getElementById('edit-id').value;
  const books = load();
  const b = books.find(x => x.id === id);
  if (!b) return;

  b.title = document.getElementById('edit-title').value.trim() || b.title;
  b.author = document.getElementById('edit-author').value.trim();
  b.status = document.getElementById('edit-status').value;
  b.currentPage = parseInt(document.getElementById('edit-current-page').value) || 0;
  b.totalPages = parseInt(document.getElementById('edit-pages').value) || 0;
  b.memo = document.getElementById('edit-memo').value.trim();
  b.rating = editRating;

  if (b.type === 'borrow') {
    b.dueDate = document.getElementById('edit-due').value || b.dueDate;
  }

  save(books); mEdit.classList.remove('show'); render();
};

// ── Dispose modal ──
const mDispose = document.getElementById('modal-dispose');
document.getElementById('btn-dispose-cancel').onclick = () => mDispose.classList.remove('show');
mDispose.onclick = e => { if (e.target === mDispose) mDispose.classList.remove('show'); };

function openDispose(id) {
  const book = load().find(b => b.id === id);
  if (!book) return;
  document.getElementById('dispose-id').value = id;
  document.getElementById('dispose-book-name').textContent = `「${book.title}」`;
  document.getElementById('dispose-method').value = book.type === 'borrow' ? 'returned' : 'sold';
  mDispose.classList.add('show');
}

document.getElementById('btn-dispose').onclick = () => {
  const id = document.getElementById('dispose-id').value;
  const books = load();
  const b = books.find(x => x.id === id);
  if (!b) return;

  b.type = 'dispose';
  b.disposeMethod = document.getElementById('dispose-method').value;
  b.disposedAt = new Date().toISOString();

  save(books); mDispose.classList.remove('show');
  document.querySelector('[data-tab="dispose"]').click();
  render();
};

// ── Delete ──
function deleteBook(id) {
  if (!confirm('完全に削除しますか？')) return;
  save(load().filter(b => b.id !== id));
  render();
}

// ── Return borrowed book ──
function returnBook(id) {
  if (!confirm('返却済みにしますか？')) return;
  const books = load();
  const b = books.find(x => x.id === id);
  if (!b) return;
  b.type = 'dispose';
  b.disposeMethod = 'returned';
  b.disposedAt = new Date().toISOString();
  save(books); render();
}

// ── Render ──
function render() {
  const books = load();
  const borrows = books.filter(b => b.type === 'borrow').sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
  const owns = books.filter(b => b.type === 'own').sort((a,b) => {
    const o = {reading:0, unread:1, done:2};
    return (o[a.status]??1) - (o[b.status]??1);
  });
  const disposed = books.filter(b => b.type === 'dispose').sort((a,b) => new Date(b.disposedAt) - new Date(a.disposedAt));

  // Header stats
  const yr = new Date().getFullYear();
  const doneThisYear = books.filter(b => b.status === 'done' || b.type === 'dispose').length;
  document.getElementById('header-stats').innerHTML = `${borrows.length}冊借りてる / ${owns.length}冊持ってる`;

  // Badge for overdue
  const overdue = borrows.filter(b => daysUntil(b.dueDate) < 0).length;
  const badge = document.getElementById('badge-borrow');
  if (overdue > 0) { badge.textContent = overdue; badge.style.display = ''; }
  else { badge.style.display = 'none'; }

  // Alert
  const alertEl = document.getElementById('borrow-alert');
  alertEl.innerHTML = overdue > 0 ? `<div class="alert">⚠️ ${overdue}冊が返却期限を過ぎています</div>` : '';

  // ── Borrow list ──
  document.getElementById('borrow-empty').style.display = borrows.length ? 'none' : '';
  document.getElementById('borrow-list').innerHTML = borrows.map(b => {
    const d = daysUntil(b.dueDate);
    let tag;
    if (d < 0) tag = `<span class="tag tag-overdue">${Math.abs(d)}日超過</span>`;
    else if (d === 0) tag = '<span class="tag tag-overdue">今日まで</span>';
    else if (d <= 3) tag = `<span class="tag tag-soon">あと${d}日</span>`;
    else tag = `<span class="tag tag-safe">あと${d}日</span>`;

    const st = b.status || 'unread';
    const stTag = `<span class="tag ${statusClass[st]}">${statusLabels[st]}</span>`;
    const pct = b.totalPages > 0 ? Math.min(100, Math.round((b.currentPage||0) / b.totalPages * 100)) : 0;
    const progressHtml = b.totalPages > 0 ? `<div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-text">${b.currentPage||0}/${b.totalPages}p (${pct}%)</span>
    </div>` : '';
    const memoHtml = b.memo ? `<div class="memo">${esc(b.memo)}</div>` : '';

    return `<div class="card">
      <div class="card-top">
        <div><div class="book-title">${esc(b.title)}</div>${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}</div>
        ${tag}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
        ${stTag}
        <span style="font-size:12px;color:var(--text-sub)">· 返却日: ${fmtDate(b.dueDate)}</span>
      </div>
      ${progressHtml}
      ${memoHtml}
      <div class="card-meta">
        <span></span>
        <div class="card-actions">
          <button class="btn-s" onclick="openEdit('${b.id}')">編集</button>
          <button class="btn-s" onclick="returnBook('${b.id}')">返却</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // ── Own list ──
  document.getElementById('own-empty').style.display = owns.length ? 'none' : '';
  document.getElementById('own-list').innerHTML = owns.map(b => {
    const pct = b.totalPages > 0 ? Math.min(100, Math.round(b.currentPage / b.totalPages * 100)) : 0;
    const progressHtml = b.totalPages > 0 ? `<div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-text">${b.currentPage}/${b.totalPages}p (${pct}%)</span>
    </div>` : '';
    const stars = b.rating > 0 ? `<span style="color:#F0A020;font-size:13px">${'★'.repeat(b.rating)}${'☆'.repeat(5-b.rating)}</span>` : '';
    const memoHtml = b.memo ? `<div class="memo">${esc(b.memo)}</div>` : '';

    return `<div class="card">
      <div class="card-top">
        <div><div class="book-title">${esc(b.title)}</div>${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}</div>
        <span class="tag ${statusClass[b.status]}">${statusLabels[b.status]}</span>
      </div>
      ${progressHtml}
      ${stars}
      ${memoHtml}
      <div class="card-meta">
        <span></span>
        <div class="card-actions">
          <button class="btn-s" onclick="openEdit('${b.id}')">編集</button>
          <button class="btn-s" onclick="openDispose('${b.id}')">手放す</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // ── Dispose list ──
  document.getElementById('dispose-empty').style.display = disposed.length ? 'none' : '';
  document.getElementById('dispose-list').innerHTML = disposed.map(b => {
    const stars = b.rating > 0 ? ` <span style="color:#F0A020;font-size:12px">${'★'.repeat(b.rating)}</span>` : '';
    return `<div class="card">
      <div class="card-top">
        <div><div class="book-title">${esc(b.title)}</div>${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}</div>
        <span class="dispose-method">${disposeLabels[b.disposeMethod] || '手放した'}</span>
      </div>
      <div class="card-meta">
        <span>${fmtDate(b.disposedAt)}${stars}</span>
        <div class="card-actions">
          <button class="btn-s" onclick="deleteBook('${b.id}')">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

updAddType();
render();
</script>
</body>
</html>
